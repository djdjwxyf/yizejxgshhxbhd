document.addEventListener('DOMContentLoaded', function() {
  const asideContent = document.querySelector('#aside-content');
  if (asideContent) {
    const calendarCard = document.createElement('div');
    calendarCard.className = 'card-widget card-calendar';
    calendarCard.innerHTML = `
      <div class="item-headline">
        <i class="fas fa-calendar-alt"></i>
        <span>日历</span>
      </div>
      <div class="calendar-container">
        <div id="simple-calendar"></div>
      </div>
    `;
    
    const announcement = document.querySelector('.card-announcement');
    if (announcement) {
      announcement.parentNode.insertBefore(calendarCard, announcement.nextSibling);
    }
    
    generateCalendar();
  }
});

function generateCalendar() {
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth();
  
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  
  let calendarHTML = '<table class="calendar-table">';
  calendarHTML += '<thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>';
  calendarHTML += '<tbody><tr>';
  
  for (let i = 0; i < firstDay; i++) {
    calendarHTML += '<td></td>';
  }
  
  for (let day = 1; day <= daysInMonth; day++) {
    const today = (day === now.getDate()) ? 'today' : '';
    calendarHTML += `<td class="${today}">${day}</td>`;
    
    if ((firstDay + day) % 7 === 0) {
      calendarHTML += '</tr><tr>';
    }
  }
  
  calendarHTML += '</tr></tbody></table>';
  calendarHTML += `<div class="calendar-month">${year}年 ${month + 1}月</div>`;
  
  document.getElementById('simple-calendar').innerHTML = calendarHTML;
}
</script>
